[build]
  publish = "."
  functions = "netlify/functions"
  command = "node scripts/build-gallery-manifest.mjs"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/guestbook"
  to = "/.netlify/functions/guestbook-read"
  status = 200

[[redirects]]
  from = "/api/guestbook-sign"
  to = "/.netlify/functions/guestbook-sign"
  status = 200
