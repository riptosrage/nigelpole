<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thanks · The Nigel Pole</title>
<meta name="robots" content="noindex">
<style>
  :root {
    --bg: #0a0a0a;
    --paper: #ede0c2;
    --paper-shadow: #c8b48c;
    --wood: #3a2618;
    --wood-dark: #1f1410;
    --ink: #1a1410;
    --red: #c41e1e;
    --red-dark: #7a1010;
    --rust: #b8651e;
    --bone: #d8c89a;
    --acid: #4eff5a;
  }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Times New Roman", Times, serif;
    color: var(--bone);
    background: var(--bg);
    background-image:
      radial-gradient(circle at 20% 30%, rgba(184, 101, 30, 0.04) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(196, 30, 30, 0.03) 0%, transparent 50%),
      repeating-linear-gradient(0deg, transparent 0 2px, rgba(255,255,255,0.012) 2px 3px),
      repeating-linear-gradient(90deg, transparent 0 2px, rgba(0,0,0,0.2) 2px 3px);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    box-sizing: border-box;
  }
  .thanks-card {
    background: var(--paper);
    border: 1px solid var(--paper-shadow);
    padding: 32px 28px;
    max-width: 460px;
    width: 100%;
    color: var(--ink);
    box-shadow: 4px 4px 0 var(--wood-dark), 0 0 0 1px var(--ink) inset;
    position: relative;
    text-align: center;
    transform: rotate(-0.5deg);
  }
  .thanks-card::before, .thanks-card::after {
    content: "";
    position: absolute;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--ink);
    box-shadow: inset -1px -1px 0 rgba(255,255,255,0.2);
  }
  .thanks-card::before { top: 6px; left: 6px; }
  .thanks-card::after { top: 6px; right: 6px; }

  .stars {
    font-family: monospace;
    font-size: 14px;
    color: var(--red);
    letter-spacing: 6px;
    margin-bottom: 14px;
  }
  h1 {
    font-family: "Impact", "Arial Black", sans-serif;
    font-size: 38px;
    color: var(--red-dark);
    margin: 0 0 16px;
    text-transform: uppercase;
    letter-spacing: 2px;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 10px;
  }
  p {
    font-family: "Times New Roman", serif;
    font-size: 16px;
    line-height: 1.6;
    margin: 12px 0;
    color: var(--ink);
  }
  .small {
    font-family: "Courier New", monospace;
    font-size: 12px;
    color: var(--wood);
    margin-top: 16px;
    letter-spacing: 1px;
  }
  .home-btn {
    display: inline-block;
    margin-top: 18px;
    background: var(--red);
    color: var(--paper) !important;
    border: 2px solid var(--ink);
    border-right-width: 3px;
    border-bottom-width: 3px;
    font-family: "Impact", sans-serif;
    font-weight: 900;
    font-size: 15px;
    padding: 8px 24px;
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 2px;
    cursor: pointer;
  }
  .home-btn:hover {
    background: var(--red-dark);
    border-right-width: 1px;
    border-bottom-width: 1px;
    border-top-width: 3px;
    border-left-width: 3px;
  }
  .signature {
    font-family: "Courier New", monospace;
    color: var(--rust);
    font-size: 11px;
    margin-top: 22px;
    letter-spacing: 2px;
  }
</style>
</head>
<body>
  <div class="thanks-card">
    <div class="stars">+ &#9733; + &#9733; + &#9733; + &#9733; +</div>
    <h1>Message Received</h1>
    <p>Thanks for sending something in. Your message is now sitting in a queue, waiting to be reviewed by hand.</p>
    <p style="font-style: italic; color: var(--red-dark);">Nigel will decide what happens next.</p>
    <a href="/" class="home-btn">&laquo; back to the pole</a>
    <p class="signature">#TEAMNIGEL</p>
  </div>
</body>
</html>
